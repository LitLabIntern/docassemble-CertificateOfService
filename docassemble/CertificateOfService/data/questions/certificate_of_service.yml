code: |
  # This controls the default country and list of states in address field questions
  AL_DEFAULT_COUNTRY = "US"
---
code: |
  # This controls the default state in address field questions
  AL_DEFAULT_STATE = "MA"
---
code: |
  github_repo_name =  'docassemble-CertificateOfService'
---
code: |
  interview_short_title = 'File a Certificate of Service'
---
code: |
  al_form_type = "existing_case" 
---
objects:
  - users: ALPeopleList.using(ask_number=True,target_number=1)
  - other_parties: ALPeopleList.using(ask_number=False,target_number=1,there_are_any=True,there_is_another=False)
  - service_address: ALAddress
---
sections:
  - review_certificate_of_service: Review your answers
---
comment: |
  Controls order and branching logic for questions specific to this form
id: interview_order_certificate_of_service
code: |
  # Set the allowed courts for this interview
  allowed_courts = []
  # Below sets the user_role and user_ask_role by asking a question.
  # You can set user_ask_role directly instead to either 'plaintiff' or 'defendant'
  user_ask_role
  users.gather()
  users[0].address.address
  users[0].phone_number
  users[0].email
  other_parties.gather()
  # set_parts(subtitle=str(users))
  docket_number
  service_date
  papers_served
  # set_progress(16)
  person_served
  if person_served == "Other":
    person_served = other_person_served
  service_address.address
  # set_progress(32)
  # set_progress(48)
  signature_date
  basic_questions_signature_flow
  # set_progress(64)
  interview_order_certificate_of_service = True
---
comment: |
  This block includes the logic for standalone interviews.
  Delete mandatory: True to include in another interview
mandatory: True
code: |
  al_intro_screen
  certificate_of_service_intro
  interview_order_certificate_of_service
  signature_date
  # Store anonymous data for analytics / statistics
  store_variables_snapshot(
      persistent=True,
      data={
          "zip": showifdef("users[0].address.zip"),
          "reached_interview_end": True,
      },
  )
  certificate_of_service_download
---
sets:
  - other_parties[i].name.first
  - other_parties[i].name.last
  - other_parties[i].name.middle
  - other_parties[i].name.suffix
id: names of opposing parties
question: |
  % if user_started_case:
  Who is this case against?
  % else:
  Who is this case against?
  % endif
fields:
  - code: |
      other_parties[i].name_fields(person_or_business="unsure")
---
generic object: ALIndividual
template: x.person_type_label
content: |
  Choose one
---
id: Certificate_of_service
continue button field: certificate_of_service_intro
question: |
  Certificate of service
subquestion: |
  This interview will help you file a Certificate of Service.
  
  Before you get started, please gather:
  
  1. 
  1. 
  1. 
  
  When you are finished, you will need to:
  
  1. 
  1.

  If you are a _____________, you can use this interview to ____________.

  Most people take about 10 minutes to complete this interview.
---
id: Is the user the plaintiff or defendant?
question: |
  Did you start this case, or are you responding to a case
  that someone else started?
subquestion: |
  ${ collapse_template(help_user_ask_role_template) }
fields: 
  - no label: user_ask_role
    datatype: radio
    choices:
      - Starting a new case: plaintiff
      - Responding to a case: defendant
  - note: |
      Okay, you are the **Plaintiff** or Petitioner in this case. The other 
      side is the **Defendant** or Respondent.
    show if:
      variable: user_ask_role
      is: "plaintiff"
  - note: |
      Okay, you are the **Defendant** or Respondent in this case. The other 
      side is the **Plaintiff** or Petitioner.
    show if:
      variable: user_ask_role
      is: "defendant"
---
id: Information About Service Date
question: |
  Information About Service Date
subquestion: |
  Please have the date ready when you served the papers.
fields:
  - "Date papers were served": service_date
    datatype: date
  - "Plaintiff received papers": plaintiff_served
    datatype: yesno
  - "Defendant received papers": defendant_served
    datatype: yesno
---
id: Details of Papers Served
question: |
  Details of Papers Served
subquestion: |
  List the papers you served.
fields:
  - "List of papers served": papers_served
    input type: area
  - "Delivered in person": personal_service
    datatype: yesno
  - "Sent papers by mail": service_by_mail
    datatype: yesno
---
id: Who Was Served
question: |
  Who Was Served?
subquestion: |
  Please provide the name of the person you served.
fields:
  - Name: person_served
    input type: radio
    choices:
      - ${ other_parties[0].name.full() }
      - Other
  - Name of person served: other_person_served
    show if:
      variable: person_served
      is: Other
---
id: Service address
sets: 
  - service_address.address
question: |
  At what address did you serve them?
fields:
  - code: |
      service_address.address_fields()
---
id: preview certificate_of_service
question: |
  Preview your form before you sign it
subquestion: |
  Here is a preview of the form you will sign on the next page.   
  
  ${ al_court_bundle.as_pdf(key='preview') }

  Click the image to open it in a new tab. Click the "Edit answers" button
  to edit your answers.

  ${ action_button_html(url_action('review_certificate_of_service'), label='Edit answers', color='info') }
  
  Remember to come back to this window to continue and sign your form.
continue button field: certificate_of_service_preview_question    
---
code: |
  signature_fields = ["users[0].signature"]
---
code: |
  signature = DAEmpty()
---
code: |
  # This is a placeholder for the addresses that will be searched
  # for matching address to court. Edit if court venue is based on 
  # a different address than the user's
  [user.address.address for user in users.complete_elements()]
  addresses_to_search = [user.address for user in users.complete_elements()]
---
id: certificate of service review screen
event: review_certificate_of_service
question: |
  Review your answers
review:
  - Edit: service_by_mail
    button: |
      **Sent papers by mail**:
      ${ word(yesno(service_by_mail)) }
  - Edit: person_served
    button: |
      **Name of person served**:
      ${ person_served }
  - Edit: plaintiffs.revisit
    button: |
      **Plaintiffs**

      % for item in plaintiffs:
        * ${ item }
      % endfor
  - Edit: docket_number
    button: |
      **Docket number**:
      ${ docket_number }
  - Edit: service_address
    button: |
      **Address where served**:
      > ${ single_paragraph(service_address) }
  - Edit: defendants.revisit
    button: |
      **Defendants**

      % for item in defendants:
        * ${ item }
      % endfor
  - Edit: signature_date
    button: |
      **Date of signature**:
      ${ signature_date }
  - Edit: service_date
    button: |
      **Date papers were served**:
      ${ service_date }
  - Edit: users.revisit
    button: |
      **Users**

      % for item in users:
        * ${ item }
      % endfor
  - Edit: plaintiff_served
    button: |
      **Plaintiff received papers**:
      ${ word(yesno(plaintiff_served)) }
  - Edit: defendant_served
    button: |
      **Defendant received papers**:
      ${ word(yesno(defendant_served)) }
  - Edit: papers_served
    button: |
      **List of papers served**:
      > ${ single_paragraph(papers_served) }
  - Edit: personal_service
    button: |
      **Delivered in person**:
      ${ word(yesno(personal_service)) }
---
id: edit plaintiffs
continue button field: plaintiffs.revisit
question: |
  Edit plaintiffs
subquestion: |
  ${ plaintiffs.table }

  ${ plaintiffs.add_action() }
---
table: plaintiffs.table
rows: plaintiffs
columns:
  - Name: |
      row_item.name_full() if defined("row_item.name.first") else ""
edit:
  - name.first
confirm: True

---
id: edit defendants
continue button field: defendants.revisit
question: |
  Edit defendants
subquestion: |
  ${ defendants.table }

  ${ defendants.add_action() }
---
table: defendants.table
rows: defendants
columns:
  - Name: |
      row_item.name_full() if defined("row_item.name.first") else ""
edit:
  - name.first
confirm: True

---
id: edit users
continue button field: users.revisit
question: |
  Edit users
subquestion: |
  ${ users.table }

  ${ users.add_action() }
---
table: users.table
rows: users
columns:
  - Name: |
      row_item.name_full() if defined("row_item.name.first") else ""
  - Address: |
      row_item.address.block() if defined("row_item.address.address") else ""
  - Phone number: |
      row_item.phone_number if defined("row_item.phone_number") else ""
  - Email: |
      row_item.email if defined("row_item.email") else ""
edit:
  - name.first
  - address.address
  - phone_number
  - email
confirm: True

---
id: download certificate_of_service
event: certificate_of_service_download
question: |
  All done
subquestion: |
  Thank you ${users}. Your form is ready to download and deliver.
  
  View, download and send your form below. Click the "Edit answers" button to fix any mistakes.

  ${ action_button_html(url_action('review_certificate_of_service'), label='Edit answers', color='info') }
  
  
  ${ al_user_bundle.download_list_html() }
  

  ${ al_user_bundle.send_button_html(show_editable_checkbox=False) }

progress: 100
---
# ALDocument objects specify the metadata for each template
objects:
  - certificate_of_service_Post_interview_instructions: ALDocument.using(title="Instructions", filename="certificate_of_service_next_steps.docx", enabled=True, has_addendum=False)
  - certificate_of_service_attachment: ALDocument.using(title="Certificate of service", filename="certificate_of_service", enabled=True, has_addendum=False, )
---
# Bundles group the ALDocuments into separate downloads, such as for court and for the user
objects:
  - al_user_bundle: ALDocumentBundle.using(elements=[certificate_of_service_Post_interview_instructions, certificate_of_service_attachment], filename="certificate_of_service", title="All forms to download for your records", enabled=True)
  - al_court_bundle: ALDocumentBundle.using(elements=[certificate_of_service_attachment],  filename="certificate_of_service", title="All forms to deliver to court", enabled=True)
---
# Each attachment defines a key in an ALDocument. We use `i` as the placeholder here so the same template is 
# used for "preview" and "final" keys, and logic in the template checks the value of 
# `i` to show or hide the user's signature
attachment:
  name: Post-interview-Instructions
  filename: certificate_of_service_next_steps
  docx template file: certificate_of_service_next_steps.docx
  variable name: certificate_of_service_Post_interview_instructions[i]
  skip undefined: True
  tagged pdf: True
---
attachment:
  name: certificate of service
  filename: certificate_of_service
  variable name: certificate_of_service_attachment[i]
  skip undefined: True
  pdf template file: certificate_of_service.pdf
  fields:
      - "service_by_mail": ${ service_by_mail }
      - "person_served": ${ person_served }
      - "plaintiffs_name_full": ${ plaintiffs[0] }
      - "docket_number": ${ docket_number }
      - "service_address": ${ service_address }
      - "defendants_name_full": ${ defendants[0] }
      - "signature": ${ signature }
      - "signature_date": ${ signature_date }
      - "service_date": ${ service_date.format() }
      - "users1_name_full": ${ users[0] }
      - "plaintiff_served": ${ plaintiff_served }
      - "defendant_served": ${ defendant_served }
      - "papers_served": ${ papers_served }
      - "personal_service": ${ personal_service }
      - "users1_address_block": ${ users[0].address.block() }
      - "users1_phone_number": ${ users[0].phone_number }
      - "users1_email": ${ users[0].email }